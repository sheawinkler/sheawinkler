name: Update Profile README

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write

jobs:
  refresh-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch sanitized repo signals
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/profile/fetch_signals.py

      - name: Render README from template
        run: python3 scripts/profile/render_readme.py

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- README.md data/profile_signals.json; then
            echo "No README changes"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md data/profile_signals.json
          git commit -m "chore(profile): refresh README signals"
          git push
